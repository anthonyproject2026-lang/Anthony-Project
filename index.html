<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SMA Registry Portal</title>

    <style>
      body { margin: 0; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; background: #F8FAFC; }
      .card { background: white; border: 1px solid #e2e8f0; border-radius: 18px; padding: 18px; box-shadow: 0 12px 30px rgba(15,23,42,.08); }
      input, button { font: inherit; }
      input { width: 100%; padding: 12px 14px; border-radius: 12px; border: 1px solid #e2e8f0; background: #f8fafc; }
      button { padding: 12px 14px; border-radius: 12px; border: 0; background: #2563eb; color: white; font-weight: 800; cursor: pointer; }
      button:disabled { opacity: .6; cursor: not-allowed; }
      table { width: 100%; border-collapse: collapse; }
      th, td { padding: 10px; border-bottom: 1px solid #eef2f7; text-align: left; vertical-align: top; font-size: 14px; }
      th { font-size: 12px; text-transform: uppercase; letter-spacing: .08em; color: #64748b; }
      .wrap { max-width: 1100px; margin: 0 auto; padding: 18px; }
      .nav { position: sticky; top: 0; background: rgba(255,255,255,.85); backdrop-filter: blur(10px); border-bottom: 1px solid #e2e8f0; }
      .nav-inner { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 14px 18px; max-width: 1100px; margin: 0 auto; }
      .badge { display:inline-block; padding: 6px 10px; border-radius: 999px; background: #eff6ff; color:#2563eb; font-weight: 900; font-size: 11px; letter-spacing: .12em; text-transform: uppercase; }
      .row { display: grid; grid-template-columns: 1fr; gap: 16px; }
      @media (min-width: 900px) { .row { grid-template-columns: 1.1fr .9fr; gap: 24px; } }
      .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
      .muted { color: #64748b; }
      .title { font-size: 40px; line-height: 1.05; margin: 10px 0 10px; color: #0f172a; }
      .actions { display:flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
      .btn2 { background:#0f172a; }
      .btnGhost { background:#f1f5f9; color:#334155; }
      .status { position: fixed; bottom: 18px; right: 18px; background: white; border-left: 8px solid #22c55e; padding: 12px 14px; border-radius: 14px; box-shadow: 0 16px 40px rgba(15,23,42,.18); font-weight: 800; }
      .status.err { border-left-color: #ef4444; }
    </style>
  </head>

  <body>
    <div id="root"></div>

    <!-- React + ReactDOM + Babel (for one-file JSX) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Firebase v9+ via CDN (modular) -->
    <script type="module">
      // Expose firebase modules to window so the Babel script can use them.
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
      import {
        getFirestore,
        collection,
        addDoc,
        onSnapshot,
        doc,
        deleteDoc,
        serverTimestamp,
        writeBatch
      } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
      import {
        getAuth,
        signInAnonymously,
        onAuthStateChanged
      } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

      window.__fb = {
        initializeApp,
        getFirestore,
        collection,
        addDoc,
        onSnapshot,
        doc,
        deleteDoc,
        serverTimestamp,
        writeBatch,
        getAuth,
        signInAnonymously,
        onAuthStateChanged
      };

      window.dispatchEvent(new Event("firebase-ready"));
    </script>

    <!-- Your app (single-file JSX) -->
    <script type="text/babel">
      const { useState, useEffect, useRef, useMemo } = React;

      const LOGO_URL =
        "https://scontent.fmel12-1.fna.fbcdn.net/v/t39.30808-6/326761430_5828990340526020_7369296547335503508_n.png?_nc_cat=106&ccb=1-7&_nc_sid=6ee11a&_nc_ohc=Yq6Q1TcrqpoQ7kNvwFk81d8&_nc_oc=AdlARv8L_j5fK1fqMV7i62IAvsckYJtF9qEaQDcBt9HFnX2pxMOZFljQ3_2H4O9Ih-k&_nc_zt=23&_nc_ht=scontent.fmel12-1.fna&_nc_gid=OuwbNU68W5hWc2g3iTPq6g&oh=00_AfpFSZ2uiPoQnNNBSfagBVCM2554tvXq7MUYB6lmOqvFCQ&oe=69733058";

      const ADMIN_PASSWORD = "admin123";
      const appId = "sma-member-registry-v2";

      const Logo = ({ size = 44 }) => (
        <img
          src={LOGO_URL}
          alt="SMA Logo"
          style={{ width: size, height: size, borderRadius: 14, objectFit: "cover", border: "1px solid #f1f5f9" }}
        />
      );

      function App() {
        const [ready, setReady] = useState(false);

        const [currentUser, setCurrentUser] = useState(null);
        const [view, setView] = useState("form");
        const [submissions, setSubmissions] = useState([]);
        const [searchTerm, setSearchTerm] = useState("");
        const [status, setStatus] = useState({ type: "", message: "" });
        const [loading, setLoading] = useState(false);
        const [connectionError, setConnectionError] = useState(false);
        const [deleteConfirmId, setDeleteConfirmId] = useState(null);

        const fileInputRef = useRef(null);

        // 1) Wait for Firebase modules to be loaded
        useEffect(() => {
          const onReady = () => setReady(true);
          window.addEventListener("firebase-ready", onReady);
          return () => window.removeEventListener("firebase-ready", onReady);
        }, []);

        const showStatus = (type, message) => {
          setStatus({ type, message });
          setTimeout(() => setStatus({ type: "", message: "" }), 5000);
        };

        // 2) Init Firebase + Auth
        useEffect(() => {
          if (!ready) return;

          const {
            initializeApp,
            getAuth,
            signInAnonymously,
            onAuthStateChanged,
            getFirestore
          } = window.__fb;

          // TODO: REPLACE with your Firebase web config (Project settings -> Web app)
          const firebaseConfig = {
            apiKey: "REPLACE_ME",
            authDomain: "REPLACE_ME",
            projectId: "REPLACE_ME",
            storageBucket: "REPLACE_ME",
            messagingSenderId: "REPLACE_ME",
            appId: "REPLACE_ME"
          };

          try {
            const app = initializeApp(firebaseConfig);
            window.__app = app;
            window.__auth = getAuth(app);
            window.__db = getFirestore(app);

            signInAnonymously(window.__auth).catch((err) => {
              console.error("Auth Error:", err);
              setConnectionError(true);
            });

            const unsub = onAuthStateChanged(window.__auth, setCurrentUser);
            return () => unsub();
          } catch (e) {
            console.error(e);
            setConnectionError(true);
          }
        }, [ready]);

        // 3) Firestore realtime sync
        useEffect(() => {
          if (!ready || !currentUser || !window.__db) return;

          const { collection, onSnapshot } = window.__fb;
          const db = window.__db;

          const colRef = collection(db, "artifacts", appId, "public", "data", "members");

          const unsub = onSnapshot(
            colRef,
            (snapshot) => {
              const docs = snapshot.docs.map((d) => ({ id: d.id, ...d.data() }));
              docs.sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));
              setSubmissions(docs);
            },
            (err) => {
              console.error("Firestore Error:", err);
              if (view === "admin-panel") showStatus("error", "Database access restricted.");
            }
          );

          return () => unsub();
        }, [ready, currentUser, view]);

        const stats = useMemo(() => {
          const totalMembers = submissions.length;
          const totalChildren = submissions.reduce((acc, curr) => acc + (Number(curr.childrenCount) || 0), 0);
          const families = submissions.filter((s) => s.spouse || (Number(s.childrenCount) || 0) > 0).length;
          return { totalMembers, totalChildren, families };
        }, [submissions]);

        const filteredMembers = useMemo(() => {
          const q = searchTerm.toLowerCase();
          return submissions.filter(
            (s) =>
              (s.name || "").toLowerCase().includes(q) ||
              (s.profession || "").toLowerCase().includes(q) ||
              (s.email || "").toLowerCase().includes(q)
          );
        }, [submissions, searchTerm]);

        const handleFormSubmit = async (e) => {
          e.preventDefault();
          if (!currentUser) return showStatus("error", "Authenticating...");

          setLoading(true);

          const formData = new FormData(e.target);
          const payload = Object.fromEntries(formData.entries());

          if (!String(payload.mobile || "").match(/^[0-9+ ]{8,15}$/)) {
            setLoading(false);
            return showStatus("error", "Invalid mobile number.");
          }

          payload.childrenCount = Number(payload.childrenCount) || 0;

          try {
            const { collection, addDoc, serverTimestamp } = window.__fb;
            const db = window.__db;

            payload.timestamp = serverTimestamp();
            payload.createdBy = currentUser.uid;

            await addDoc(collection(db, "artifacts", appId, "public", "data", "members"), payload);
            showStatus("success", "Registration complete. Welcome to SMA!");
            e.target.reset();
          } catch (err) {
            console.error(err);
            showStatus("error", "Submission failed.");
          } finally {
            setLoading(false);
          }
        };

        const handleDelete = async (id) => {
          try {
            const { doc, deleteDoc } = window.__fb;
            const db = window.__db;

            await deleteDoc(doc(db, "artifacts", appId, "public", "data", "members", id));
            setDeleteConfirmId(null);
            showStatus("success", "Member record deleted.");
          } catch (err) {
            console.error(err);
            showStatus("error", "Delete failed.");
          }
        };

        const handleExportCSV = () => {
          const headers = ["Name", "Email", "Mobile", "Profession", "Spouse", "Children", "Child Names", "Join Date"];
          const rows = submissions.map((s) => [
            `"${s.name || ""}"`,
            `"${s.email || ""}"`,
            `"${s.mobile || ""}"`,
            `"${s.profession || ""}"`,
            `"${s.spouse || ""}"`,
            Number(s.childrenCount) || 0,
            `"${s.childrenNames || ""}"`,
            s.timestamp?.seconds ? new Date(s.timestamp.seconds * 1000).toLocaleDateString() : "New"
          ]);

          const blob = new Blob([[headers.join(","), ...rows.map((r) => r.join(","))].join("\n")], { type: "text/csv" });
          const link = document.createElement("a");
          link.href = URL.createObjectURL(blob);
          link.download = `SMA_Admin_Export_${new Date().toISOString().split("T")[0]}.csv`;
          link.click();
        };

        const handleImportCSV = (e) => {
          const file = e.target.files[0];
          if (!file) return;

          const reader = new FileReader();
          reader.onload = async (ev) => {
            const text = String(ev.target.result || "");
            const lines = text.split("\n").filter((l) => l.trim());

            try {
              const { writeBatch, collection, doc, serverTimestamp } = window.__fb;
              const db = window.__db;

              const batch = writeBatch(db);

              lines.slice(1).forEach((line) => {
                const v = line.split(",").map((item) => item.replace(/^"|"$/g, "").trim());
                const newDocRef = doc(collection(db, "artifacts", appId, "public", "data", "members"));

                batch.set(newDocRef, {
                  name: v[0] || "",
                  email: v[1] || "",
                  mobile: v[2] || "",
                  profession: v[3] || "",
                  spouse: v[4] || "",
                  childrenCount: Number(v[5]) || 0,
                  childrenNames: v[6] || "",
                  timestamp: serverTimestamp(),
                  imported: true
                });
              });

              await batch.commit();
              showStatus("success", "Import successful.");
            } catch (err) {
              console.error(err);
              showStatus("error", "Import failed.");
            }
          };
          reader.readAsText(file);
        };

        if (connectionError) {
          return (
            <div className="wrap" style={{ paddingTop: 80 }}>
              <div className="card" style={{ maxWidth: 520, margin: "0 auto", textAlign: "center" }}>
                <h2 style={{ marginTop: 0 }}>Connection Error</h2>
                <p className="muted">Unable to authenticate. Please check your network.</p>
                <button onClick={() => window.location.reload()}>Retry</button>
              </div>
            </div>
          );
        }

        return (
          <div>
            <div className="nav">
              <div className="nav-inner">
                <div style={{ display: "flex", alignItems: "center", gap: 10, cursor: "pointer" }} onClick={() => setView("form")}>
                  <Logo size={40} />
                  <div>
                    <div style={{ fontWeight: 950, color: "#0f172a", lineHeight: 1 }}>SMA</div>
                    <div className="muted" style={{ fontSize: 11, fontWeight: 800, textTransform: "uppercase", letterSpacing: ".08em" }}>
                      Registry Portal
                    </div>
                  </div>
                </div>

                <div className="actions">
                  {view !== "form" ? (
                    <button className="btnGhost" onClick={() => setView("form")}>New Registration</button>
                  ) : (
                    <button className="btnGhost" onClick={() => setView("admin-login")}>Admin Access</button>
                  )}
                </div>
              </div>
            </div>

            <div className="wrap">
              {status.message && (
                <div className={"status " + (status.type === "error" ? "err" : "")}>
                  {status.message}
                </div>
              )}

              {view === "form" && (
                <div className="row" style={{ paddingTop: 18 }}>
                  <div>
                    <span className="badge">Official Community Hub</span>
                    <h1 className="title">Empowering the <span style={{ color: "#2563eb" }}>Malayalee</span> Spirit.</h1>
                    <p className="muted" style={{ fontSize: 16, maxWidth: 520 }}>
                      Register once to stay connected with the Shepparton Malayalee Association events and community services.
                    </p>
                    <p className="muted" style={{ fontWeight: 900 }}>
                      {submissions.length > 0 ? `${submissions.length} Members Registered` : "Join us as our first member"}
                    </p>
                  </div>

                  <div className="card">
                    <form onSubmit={handleFormSubmit} style={{ display: "grid", gap: 12 }}>
                      <div>
                        <div className="muted" style={{ fontSize: 11, fontWeight: 900, textTransform: "uppercase", letterSpacing: ".08em", marginBottom: 6 }}>
                          Full Name
                        </div>
                        <input name="name" required placeholder="John Doe" />
                      </div>

                      <div className="grid2">
                        <input name="email" type="email" required placeholder="Email" />
                        <input name="mobile" required placeholder="Mobile" />
                      </div>

                      <div>
                        <div className="muted" style={{ fontSize: 11, fontWeight: 900, textTransform: "uppercase", letterSpacing: ".08em", marginBottom: 6 }}>
                          Profession
                        </div>
                        <input name="profession" required placeholder="Occupation" />
                      </div>

                      <div>
                        <div className="muted" style={{ fontSize: 11, fontWeight: 900, textTransform: "uppercase", letterSpacing: ".08em", marginBottom: 6 }}>
                          Family (Optional)
                        </div>
                        <div className="grid2">
                          <input name="spouse" placeholder="Spouse" />
                          <input name="childrenCount" type="number" placeholder="No. Children" />
                        </div>
                        <div style={{ height: 10 }} />
                        <input name="childrenNames" placeholder="Children Names (comma separated)" />
                      </div>

                      <button disabled={loading}>{loading ? "Submitting..." : "Register Now"}</button>
                    </form>
                  </div>
                </div>
              )}

              {view === "admin-login" && (
                <div style={{ paddingTop: 40 }}>
                  <div className="card" style={{ maxWidth: 520, margin: "0 auto", textAlign: "center" }}>
                    <h2 style={{ marginTop: 0 }}>Admin Login</h2>
                    <p className="muted">Authorised Access Only</p>
                    <form
                      onSubmit={(e) => {
                        e.preventDefault();
                        const pw = e.target.pw.value;
                        if (pw === ADMIN_PASSWORD) setView("admin-panel");
                        else showStatus("error", "Incorrect Admin Key");
                      }}
                      style={{ display: "grid", gap: 12, marginTop: 14 }}
                    >
                      <input name="pw" type="password" placeholder="••••••••" />
                      <button className="btn2" type="submit">Unlock Admin View</button>
                    </form>
                  </div>
                </div>
              )}

              {view === "admin-panel" && (
                <div style={{ paddingTop: 18, display: "grid", gap: 12 }}>
                  <div className="card">
                    <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 10, flexWrap: "wrap" }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                        <Logo size={56} />
                        <div>
                          <div style={{ fontSize: 26, fontWeight: 950, color: "#0f172a" }}>Admin Dashboard</div>
                          <div className="muted" style={{ fontWeight: 900, fontSize: 11, textTransform: "uppercase", letterSpacing: ".12em" }}>
                            SMA Official Member Management
                          </div>
                        </div>
                      </div>
                      <div className="muted" style={{ fontWeight: 900 }}>
                        Total: {stats.totalMembers} • Families: {stats.families} • Children: {stats.totalChildren}
                      </div>
                    </div>
                  </div>

                  <div className="card">
                    <div style={{ display: "flex", gap: 10, flexWrap: "wrap", justifyContent: "space-between", alignItems: "center" }}>
                      <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                        <input ref={fileInputRef} type="file" accept=".csv" style={{ display: "none" }} onChange={handleImportCSV} />
                        <button className="btnGhost" onClick={() => fileInputRef.current.click()}>Import CSV</button>
                        <button className="btn2" onClick={handleExportCSV}>Export All</button>
                      </div>

                      <div style={{ minWidth: 260 }}>
                        <input
                          type="text"
                          placeholder="Search members..."
                          value={searchTerm}
                          onChange={(e) => setSearchTerm(e.target.value)}
                        />
                      </div>
                    </div>
                  </div>

                  <div className="card" style={{ overflowX: "auto" }}>
                    <table>
                      <thead>
                        <tr>
                          <th>Member</th>
                          <th>Role</th>
                          <th>Family</th>
                          <th style={{ textAlign: "right" }}>Actions</th>
                        </tr>
                      </thead>
                      <tbody>
                        {filteredMembers.map((m) => (
                          <tr key={m.id}>
                            <td>
                              <div style={{ fontWeight: 950, color: "#0f172a" }}>{m.name}</div>
                              <div className="muted" style={{ fontSize: 12 }}>{m.email}</div>
                              <div style={{ color: "#2563eb", fontWeight: 900, fontSize: 12 }}>{m.mobile}</div>
                            </td>
                            <td>{m.profession || "N/A"}</td>
                            <td>
                              <div>{m.spouse ? `Spouse: ${m.spouse}` : ""}</div>
                              <div className="muted" style={{ fontSize: 12 }}>
                                {(Number(m.childrenCount) || 0) > 0 ? `Children: ${m.childrenNames || ""}` : ""}
                              </div>
                            </td>
                            <td style={{ textAlign: "right" }}>
                              {deleteConfirmId === m.id ? (
                                <span style={{ display: "inline-flex", gap: 8 }}>
                                  <button style={{ background: "#ef4444" }} onClick={() => handleDelete(m.id)}>Confirm</button>
                                  <button className="btnGhost" onClick={() => setDeleteConfirmId(null)}>Cancel</button>
                                </span>
                              ) : (
                                <button className="btnGhost" onClick={() => setDeleteConfirmId(m.id)}>Delete</button>
                              )}
                            </td>
                          </tr>
                        ))}
                        {filteredMembers.length === 0 && (
                          <tr><td colSpan="4" className="muted">No members found.</td></tr>
                        )}
                      </tbody>
                    </table>
                  </div>
                </div>
              )}
            </div>
          </div>
        );
      }

      // React 18 createRoot
      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
